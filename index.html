<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mebak Criptolater</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #0ff; }
    textarea, input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      background: #222;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      background: #0ff;
      color: #111;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    button:hover { background: #0cc; }
    .box { margin: 20px 0; }
    #resultado {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border: 1px solid #0ff;
      border-radius: 5px;
      color: #0ff;
      min-height: 50px;
    }
    #criptografarBtn { display: none; } /* escondido no início */
  </style>
</head>
<body>
  <h1>Mebak Criptolater</h1>

  <div class="box">
    <label>Texto:</label><br>
    <textarea id="texto" rows="4"></textarea><br>
    <label>Key:</label><br>
    <input type="text" id="keyInput" oninput="checkDebugMode()">
  </div>

  <div class="box">
    <label>Output/Input:</label><br>
    <textarea id="output" rows="4"></textarea><br>
    <button id="criptografarBtn" onclick="criptografar()">Cryptografh</button>
    <button onclick="descriptografar()">Decrypt</button><br>
    <label>Key para descriptografar:</label><br>
    <input type="text" id="keyOutput">
  </div>

  <div id="resultado">Resultado aparecerá aqui...</div>

  <script>
    function checkDebugMode() {
      let chave = document.getElementById("keyInput").value;
      let btn = document.getElementById("criptografarBtn");
      if (chave === "debugmode%") {
        btn.style.display = "inline-block"; // mostra o botão
      } else {
        btn.style.display = "none"; // esconde de novo
      }
    }

    function criptografar() {
      let texto = document.getElementById("texto").value;
      let chave = document.getElementById("keyInput").value;

      if (!texto || !chave) {
        document.getElementById("resultado").innerText = "Digite o texto e a key!";
        return;
      }

      let combinado = texto + "::" + chave;
      let criptografado = btoa(combinado);

      document.getElementById("output").value = criptografado;
      document.getElementById("resultado").innerText = "Texto criptografado gerado!";
    }

    function descriptografar() {
      let criptografado = document.getElementById("output").value;
      let chave = document.getElementById("keyOutput").value;

      if (!criptografado || !chave) {
        document.getElementById("resultado").innerText = "Digite o texto criptografado e a key!";
        return;
      }

      try {
        let decodificado = atob(criptografado);
        let partes = decodificado.split("::");

        if (partes[1] === chave) {
          document.getElementById("resultado").innerText = "Texto original: " + partes[0];
        } else {
          document.getElementById("resultado").innerText = "Key incorreta!";
        }
      } catch (e) {
        document.getElementById("resultado").innerText = "Erro ao descriptografar. Verifique o texto e a key.";
      }
    }
  </script>
</body>
</html>
